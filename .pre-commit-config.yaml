# Pre-commit hooks for physdes-rs
#
# To use these hooks, install pre-commit:
#   pip install pre-commit
#
# Then run:
#   pre-commit install
#
# To run hooks manually:
#   pre-commit run --all-files

repos:
  # Rust formatting
  - repo: local
    hooks:
      - id: rust-fmt
        name: rust-fmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false

  # Rust linting with clippy
  - repo: local
    hooks:
      - id: rust-clippy
        name: rust-clippy
        entry: cargo clippy --all-targets --all-features
        language: system
        types: [rust]
        pass_filenames: false

  # Rust tests
  - repo: local
    hooks:
      - id: rust-test
        name: rust-test
        entry: cargo test
        language: system
        types: [rust]
        pass_filenames: false

  # Check for trailing whitespace
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  # Check for spelling errors
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        args: ['--ignore-words-list', 'crate,falsy']
        exclude: 'Cargo.lock|target/|\.svg$'